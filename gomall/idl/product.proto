syntax = "proto3";

package product;

option go_package = "github.com/cloudwego/biz-demo/gomall/kitex_gen/product";

service ProductCatalogService {
  rpc ListProducts(ListProductsReq) returns (ListProductsResp) {}
  rpc GetProduct(GetProductReq) returns (GetProductResp) {}
  rpc SearchProducts(SearchProductsReq) returns (SearchProductsResp) {}
  rpc CreateProduct(CreateProductReq) returns (CreateProductResp) {}
  rpc UpdateProduct(UpdateProductReq) returns (UpdateProductResp) {}
  rpc IncrementSales(IncrementSalesReq) returns (IncrementSalesResp) {}
  rpc DeductStock(DeductStockReq) returns (DeductStockResp) {}
  rpc RestoreStock(RestoreStockReq) returns (RestoreStockResp) {}
  rpc GetStock(GetStockReq) returns (GetStockResp) {}
  rpc SetDiscount(SetDiscountReq) returns (SetDiscountResp) {}
  rpc CancelDiscount(CancelDiscountReq) returns (CancelDiscountResp) {}
  rpc GetProductPriceHistory(GetProductPriceHistoryReq) returns (GetProductPriceHistoryResp) {}
}

message ListProductsReq{
  int32 page = 1;
  int64 pageSize = 2;

  string categoryName = 3;
  int32 discount_filter = 4;
}

message Product {
  uint32 id = 1;
  string name = 2;
  string description = 3;
  string picture = 4;
  float price = 5;

  repeated string categories = 6;
  uint32 sales = 7;
  int64 stock = 8;
  
  int32 discount_type = 9;
  float discount_value = 10;
  int64 discount_start_time = 11;
  int64 discount_end_time = 12;
  float original_price = 13;
  float actual_price = 14;
  string discount_label = 15;
  int32 discount_status = 16;
}

message ListProductsResp {
  repeated Product products = 1;
}

message GetProductReq {
  uint32 id = 1;
}

message GetProductResp {
  Product product = 1;
}

message SearchProductsReq {
  string query = 1;
}

message SearchProductsResp {
  repeated Product results = 1;
}

message CreateProductReq {
  string name = 1;
  string description = 2;
  string picture = 3;
  float price = 4;
  repeated string categories = 5;
  int64 stock = 6;
}

message CreateProductResp {
  uint32 product_id = 1;
}

message UpdateProductReq {
  uint32 id = 1;
  string name = 2;
  string description = 3;
  string picture = 4;
  float price = 5;
  repeated string categories = 6;
  int64 stock = 7;
}

message UpdateProductResp {
  bool success = 1;
}

message IncrementSalesReq {
  uint32 id = 1;
  int32 quantity = 2;
}

message IncrementSalesResp {
  bool success = 1;
}

message DeductStockReq {
  uint32 product_id = 1;
  int32 quantity = 2;
}

message DeductStockResp {
  bool success = 1;
  int64 remaining_stock = 2;
  string error_message = 3;
}

message RestoreStockReq {
  uint32 product_id = 1;
  int32 quantity = 2;
}

message RestoreStockResp {
  bool success = 1;
}

message GetStockReq {
  uint32 product_id = 1;
}

message GetStockResp {
  int64 stock = 1;
  bool exists = 2;
}

message SetDiscountReq {
  uint32 product_id = 1;
  int32 discount_type = 2;
  float discount_value = 3;
  int64 start_time = 4;
  int64 end_time = 5;
}

message SetDiscountResp {
  bool success = 1;
  string message = 2;
}

message CancelDiscountReq {
  uint32 product_id = 1;
}

message CancelDiscountResp {
  bool success = 1;
  string message = 2;
}

message PriceHistoryItem {
  uint32 id = 1;
  uint32 product_id = 2;
  int32 change_type = 3;
  float old_price = 4;
  float new_price = 5;
  int32 old_discount_type = 6;
  int32 new_discount_type = 7;
  float old_discount_value = 8;
  float new_discount_value = 9;
  int64 discount_start_time = 10;
  int64 discount_end_time = 11;
  string operator_name = 12;
  string remark = 13;
  int64 created_at = 14;
}

message GetProductPriceHistoryReq {
  uint32 product_id = 1;
  int32 limit = 2;
}

message GetProductPriceHistoryResp {
  repeated PriceHistoryItem items = 1;
}
